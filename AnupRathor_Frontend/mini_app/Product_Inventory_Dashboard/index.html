<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Inventory Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <!-- It will apply Sora font from google -->
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!--LOADING OVERLAY -->
    <div id="loading-overlay">
      <div class="loader-box">
        <div class="spinner"></div>
        <p class="loader-text" id="loader-text">
          Fetching products from API...
        </p>
        <div class="progress-bar">
          <div class="progress-fill" id="prog-fill"></div>
        </div>
      </div>
    </div>

    <!-- TOP NAVIGATION BAR  -->
    <header class="topbar">
      <div class="topbar-logo">
        <div class="logo-mark">&#9632;</div>
        <div class="logo-words">
          <span class="logo-main">Product Inventory</span>
          <span class="logo-sub">Dashboard</span>
        </div>
      </div>

      <!-- Wide search bar — category dropdown + text input + orange button -->
      <div class="topbar-search">
        <select id="search-cat-filter" class="search-cat" onchange="onFilter()">
          <option value="all">All Categories</option>
          <option value="electronics">Electronics</option>
          <option value="clothing">Clothing</option>
          <option value="books">Books</option>
          <option value="accessories">Accessories</option>
        </select>
        <div class="search-sep"></div>
        <input
          type="text"
          id="search-input"
          class="search-field"
          placeholder="Search for products, categories..."
          oninput="onFilter()"
        />
        <button class="search-btn" onclick="onFilter()" aria-label="Search">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none">
            <circle
              cx="8.5"
              cy="8.5"
              r="5.5"
              stroke="currentColor"
              stroke-width="2"
            />
            <path
              d="M13 13L17 17"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>

      <!-- Live counts in topbar -->
      <div class="topbar-right">
        <div class="topbar-stat">
          <span class="ts-num" id="header-count">0</span>
          <span class="ts-lbl">Total Items</span>
        </div>
        <div class="topbar-divider"></div>
        <div class="topbar-stat">
          <span class="ts-num warn" id="header-low">0</span>
          <span class="ts-lbl">Low Stock</span>
        </div>
        <div class="topbar-divider"></div>
        <div class="topbar-stat">
          <span class="ts-num danger" id="header-out">0</span>
          <span class="ts-lbl">Out of Stock</span>
        </div>
      </div>
    </header>

    <nav class="cat-strip">
      <div class="cat-strip-inner">
        <button class="csb active" id="cs-all" onclick="setCategory('all')">
          &#127758; All Products
        </button>
        <button
          class="csb"
          id="cs-electronics"
          onclick="setCategory('electronics')"
        >
          &#128187; Electronics
        </button>
        <button class="csb" id="cs-clothing" onclick="setCategory('clothing')">
          &#128248; Clothing
        </button>
        <button class="csb" id="cs-books" onclick="setCategory('books')">
          &#128218; Books
        </button>
        <button
          class="csb"
          id="cs-accessories"
          onclick="setCategory('accessories')"
        >
          &#9201; Accessories
        </button>
      </div>
    </nav>
    <div class="page-body">
      <aside class="sidebar">
        <div class="sb-block">
          <h3 class="sb-heading">Sort By</h3>
          <select id="sort-sel" class="sb-select" onchange="onFilter()">
            <option value="def">Default Order</option>
            <option value="pa">Price: Low to High</option>
            <option value="pd">Price: High to Low</option>
            <option value="az">Name: A to Z</option>
            <option value="za">Name: Z to A</option>
          </select>
        </div>

        <div class="sb-block">
          <h3 class="sb-heading">Stock Filter</h3>
          <div class="low-toggle" id="low-tog" onclick="toggleLow()">
            <span>Low stock only (&lt; 5)</span>
            <div class="tog-track"></div>
          </div>
        </div>

        <hr class="sb-divider" />

        <div class="sb-block">
          <h3 class="sb-heading">Quick Stats</h3>
          <div class="sb-stats">
            <div class="sb-stat-row">
              <span class="sb-stat-lbl">Total Products</span>
              <span class="sb-stat-val" id="sb-total">0</span>
            </div>
            <div class="sb-stat-row">
              <span class="sb-stat-lbl">Inventory Value</span>
              <span class="sb-stat-val green" id="sb-value">&#8377;0</span>
            </div>
            <div class="sb-stat-row">
              <span class="sb-stat-lbl">Out of Stock</span>
              <span class="sb-stat-val red" id="sb-out">0</span>
            </div>
            <div class="sb-stat-row">
              <span class="sb-stat-lbl">Low Stock</span>
              <span class="sb-stat-val orange" id="sb-low">0</span>
            </div>
          </div>
          <button class="sb-analytics-btn" onclick="switchTab('analytics')">
            &#128200; View Full Analytics
          </button>
        </div>
      </aside>

      
      <main class="main-area">
 
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-products"  onclick="switchTab('products')">&#128230; Products List</button>
        <button class="tab-btn"        id="tab-add"       onclick="switchTab('add')">&#10133; Add Product</button>
        <button class="tab-btn"        id="tab-analytics" onclick="switchTab('analytics')">&#128200; Analytics</button>
      </div>
 
      <div class="tab-panel active" id="panel-products">
        <p>Products will go here</p>
      </div>
 
      <div class="tab-panel" id="panel-add">
        <p>Add form will go here</p>
      </div>
 
      <div class="tab-panel" id="panel-analytics">
        <p>Analytics will go here</p>
      </div>
 
    </main>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
